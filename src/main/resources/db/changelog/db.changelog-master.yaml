databaseChangeLog:
  - changeSet:
      id: 1-create-producer
      author: Bartłomiej Rydzak
      changes:
        - createTable:
            tableName: producer
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-product
      author: Bartłomiej Rydzak
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: attributes
                  type: JSONB

        - addForeignKeyConstraint:
            baseTableName: product
            baseColumnNames: producer_id
            referencedTableName: producer
            referencedColumnNames: id
            constraintName: fk_product_producer